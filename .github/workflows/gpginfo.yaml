name: GPG Info
on: workflow_dispatch
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      -
        name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      -
        name: Get default key info
        run: |
          gpg -K
